# Creates a GitHub Release.
# Workflow is manually run.
# Preselect branch or tag before running this workflow.
name: release

on:
  workflow_dispatch:
    inputs:
      nightly:
        description: "Mark as nightly build"
        required: true
        default: true
        type: boolean
      dogorelease:
        description: "Run goreleaser"
        required: true
        default: true
        type: boolean
      dodistrelease:
        description: "Release distribution source tarball"
        required: true
        default: false
        type: boolean
      dodebrelease:
        description: "Release DEB packages in APT repository"
        required: true
        default: false
        type: boolean
      dorpmrelease:
        description: "Release RPM packages in YUM repository"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-slim
    steps:
      - name: Disable release on nightly repository
        if: ${{ !inputs.nightly }}
        run: |
          if [ "$GITHUB_REPOSITORY" == "openbao/openbao-nightly" ]; then
            echo "Refusing to run non-nightly release on nightly repo" 1>&2
            exit 1
          fi

      - name: Allow nightly builds for fork testing
        if: inputs.nightly
        run: |
          case "$GITHUB_REPOSITORY" in
            "openbao/openbao-nightly")
              echo "Official nightly repository detected"
              ;;
            "space-aditya/openbao")
              echo "Fork testing repository detected"
              ;;
            *)
              echo "Refusing to run nightly release on unauthorized repo" 1>&2
              exit 1
              ;;
          esac

  release-main:
    runs-on: ubuntu-latest
    needs:
      - setup

    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
      SYFT_GOLANG_SEARCH_LOCAL_MOD_CACHE_LICENSES: "true"
      SYFT_GOLANG_SEARCH_REMOTE_LICENSES: "true"

    strategy:
      matrix:
        release_os:
          - linux

    steps:
      - name: Free additional storage on runner
        if: inputs.dogorelease
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Check free storage on runner
        if: inputs.dogorelease
        run: |
          df -h .

      - name: Checkout
        if: inputs.dogorelease
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Configure nightly build
        if: inputs.dogorelease && inputs.nightly
        run: |
          git remote add upstream https://github.com/openbao/openbao || true
          git fetch --all

          for tag in $(git tag); do
            if [[ "$tag" == *nightly* ]]; then
              git tag --delete "$tag"
            fi
          done

          nightly_tag="$(bash ./scripts/nightly_tag.sh)"
          git tag "$nightly_tag"

      - name: Golang Setup
        if: inputs.dogorelease
        uses: ./.github/actions/set-up-go

      - name: go-check
        if: inputs.dogorelease
        run: go version

      - name: UI Cache Setup
        if: inputs.dogorelease
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            http/web_ui/
          key: ${{ github.ref }}-ui

      - name: Download Syft
        if: inputs.dogorelease
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Qemu Setup
        if: inputs.dogorelease
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Buildx Setup
        if: inputs.dogorelease
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Skip signing and registry auth on fork
        if: github.repository == 'space-aditya/openbao'
        run: |
          echo "Skipping signing, docker auth, and publishing"

      - name: Install GoReleaser
        if: inputs.dogorelease
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          install-only: true
          version: v2.5.1

      - name: Create Go module cache dir for Syft license resolution
        if: inputs.dogorelease
        run: mkdir -p "${HOME}/go/pkg/mod"

      - name: "GoReleaser: Release"
        if: inputs.dogorelease
        run: |
          if [[ ! -f "goreleaser.${{ matrix.release_os }}.yaml" ]]; then
            yq e '.builds[0].goos |= ["${{ matrix.release_os }}"] | .checksum.name_template |= "checksums-${{ matrix.release_os }}.txt"' "goreleaser.other.yaml" | goreleaser release --clean --snapshot --skip=publish --skip=sign --timeout=60m --verbose --parallelism 2 -f -
          else
            goreleaser release --clean --snapshot --skip=publish --skip=sign --timeout=60m --verbose --parallelism 2 -f "goreleaser.${{ matrix.release_os }}.yaml"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIGHTLY_RELEASE: ${{ inputs.nightly }}

      - name: Inspect generated SBOMs
        if: inputs.dogorelease
        run: |
          echo "==== SBOM FILES ===="
          find dist -iname "*sbom*" || true

          echo "==== SPDX FILES ===="
          find dist -iname "*.spdx.json" || true

          echo "==== CycloneDX FILES ===="
          find dist -iname "*.cdx.json" || true

          for f in $(find dist -iname "*.spdx.json"); do
            echo "==== VALIDATING $f ===="
            jq '.artifacts | length' "$f" || true
            jq '.. | .licenses? // empty' "$f" | head || true
          done
