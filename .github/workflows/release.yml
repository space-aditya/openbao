# Creates a GitHub Release.
# Workflow is manually run.
# Preselect branch or tag before running this workflow.

name: release

on:
  workflow_dispatch:
    inputs:
      nightly:
        description: "Mark as nightly build"
        required: true
        default: true
        type: boolean

      dogorelease:
        description: "Run goreleaser"
        required: true
        default: true
        type: boolean

      dodistrelease:
        description: "Create distribution release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOCKER_CLI_EXPERIMENTAL: enabled

  # SPDX/SBOM fixes
  SYFT_GOLANG_SEARCH_LOCAL_MOD_CACHE_LICENSES: "true"
  SYFT_GOLANG_SEARCH_REMOTE_LICENSES: "false"

  GOMODCACHE: /home/runner/go/pkg/mod
  SYFT_GOLANG_LOCAL_MOD_CACHE_DIR: /home/runner/go/pkg/mod

  GOTOOLCHAIN: local

jobs:
  release-main:
    name: release-main (${{ matrix.goos }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goos:
          - linux
          - darwin
          - windows
          - freebsd
          - openbsd
          - netbsd

    env:
      GOOS: ${{ matrix.goos }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Optional signing support.
      # Fork-safe: skipped automatically when secrets are absent.
      - name: GPG Import
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Verify Syft
        run: syft version

      - name: Go mod download
        run: go mod download

      - name: Show Syft env
        run: |
          echo "SYFT_GOLANG_SEARCH_LOCAL_MOD_CACHE_LICENSES=$SYFT_GOLANG_SEARCH_LOCAL_MOD_CACHE_LICENSES"
          echo "SYFT_GOLANG_SEARCH_REMOTE_LICENSES=$SYFT_GOLANG_SEARCH_REMOTE_LICENSES"
          echo "SYFT_GOLANG_LOCAL_MOD_CACHE_DIR=$SYFT_GOLANG_LOCAL_MOD_CACHE_DIR"

      - name: Run GoReleaser
        if: ${{ inputs.dogorelease }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # SPDX/SBOM fixes
          SYFT_GOLANG_SEARCH_LOCAL_MOD_CACHE_LICENSES: "true"
          SYFT_GOLANG_SEARCH_REMOTE_LICENSES: "false"

          GOMODCACHE: /home/runner/go/pkg/mod
          SYFT_GOLANG_LOCAL_MOD_CACHE_DIR: /home/runner/go/pkg/mod

      - name: List dist artifacts
        run: |
          echo "==== DIST FILES ===="
          find dist -type f | sort || true

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.goos }}
          path: |
            dist/*.spdx.json
            dist/*.sbom
            dist/**/*.spdx.json
            dist/**/*.sbom
          if-no-files-found: warn

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}
          path: |
            dist/*
          if-no-files-found: warn
